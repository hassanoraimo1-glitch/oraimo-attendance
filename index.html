<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Oraimo HR System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#00C853; --green-dark:#009624; --green-glow:rgba(0,200,83,.25);
  --black:#080808; --dark:#111; --card:#191919; --card2:#202020;
  --border:#2a2a2a; --text:#f2f2f2; --muted:#777;
  --red:#ff4444; --yellow:#FFD600; --blue:#2979FF; --purple:#9c27b0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text);min-height:100vh;overflow-x:hidden}

/* --- RTL Support --- */
body.rtl { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; }
body.rtl .topbar-left { flex-direction: row-reverse; }
body.rtl .nav-item { flex-direction: column; }
body.rtl .modal-close { float: left; }
body.rtl .sh-action { float: left; }
body.rtl .perf-val { text-align: left; }

/* Splash */
#splash{position:fixed;inset:0;background:var(--black);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.splash-icon{width:110px;height:110px;border-radius:28px;background:linear-gradient(135deg,#00C853,#00952f);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 0 60px var(--green-glow)}
.splash-o{font-size:56px;font-weight:900;color:#fff;font-style:italic}

/* Pages */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* Login */
#login-page{padding:30px 20px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh;}
.login-form{width:100%;max-width:340px}
.inp-grp{margin-bottom:14px}
.inp-grp label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.inp-grp input, .inp-grp select{width:100%;padding:13px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:#fff;outline:none}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:700;cursor:pointer;transition:.2s}
.btn-green{background:var(--green);color:#000}

/* Topbar */
.topbar{position:sticky;top:0;z-index:100;background:rgba(17,17,17,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:36px;height:36px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff}
.icon-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px}

/* Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,17,17,.97);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px;cursor:pointer}
.nav-label{font-size:10px;margin-top:2px;color:var(--muted)}
.nav-item.active .nav-label{color:var(--green)}

/* Utility */
.notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--card2);border-radius:11px;padding:11px 18px;font-size:13px;z-index:9000;border:1px solid var(--green)}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-icon"><div class="splash-o">O</div></div>
  <h2 style="color:var(--green); letter-spacing:2px">ORAIMO HR</h2>
</div>

<div id="login-page" class="page active">
  <div class="login-form">
    <h1 style="text-align:center; margin-bottom:20px" data-i18n="login_title">ORAIMO HR</h1>
    <div class="inp-grp">
      <label data-i18n="username">Username</label>
      <input type="text" id="login-user">
    </div>
    <div class="inp-grp">
      <label data-i18n="password">Password</label>
      <input type="password" id="login-pass">
    </div>
    <button class="btn btn-green" onclick="doLogin()" data-i18n="login_btn">Sign In</button>
    <button class="btn" style="background:transparent; color:var(--muted); margin-top:10px" onclick="toggleLanguage()">🌐 English / العربية</button>
    <p id="login-err" style="color:var(--red); font-size:12px; text-align:center; margin-top:10px"></p>
  </div>
</div>

<div id="emp-app" class="page">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">O</div>
      <div>
        <div style="font-size:13px; font-weight:800; color:var(--green)">ORAIMO HR</div>
        <div id="emp-name-top" style="font-size:11px; color:var(--muted)">Employee</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="toggleLanguage()">🌐</button>
      <button class="icon-btn" onclick="location.reload()">🚪</button>
    </div>
  </div>
  
  <div class="content" style="padding:20px">
    <div id="emp-home">
       <h3 data-i18n="welcome">Welcome Back</h3>
       </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="empTab('home',this)">
      <span>🏠</span><span class="nav-label" data-i18n="nav_home">Home</span>
    </div>
    <div class="nav-item" onclick="empTab('sales',this)">
      <span>🛒</span><span class="nav-label" data-i18n="nav_sales">Sales</span>
    </div>
    <div class="nav-item" onclick="empTab('profile',this)">
      <span>👤</span><span class="nav-label" data-i18n="nav_profile">Profile</span>
    </div>
  </div>
</div>

<script>
// --- 1. نظام الترجمة (I18N) ---
const translations = {
  en: {
    login_title: "ORAIMO HR",
    username: "Username",
    password: "Password",
    login_btn: "Sign In",
    nav_home: "Home",
    nav_sales: "Sales",
    nav_profile: "Profile",
    welcome: "Welcome Back",
    lang_msg: "Language changed to English"
  },
  ar: {
    login_title: "أورايمو HR",
    username: "اسم المستخدم",
    password: "كلمة المرور",
    login_btn: "تسجيل الدخول",
    nav_home: "الرئيسية",
    nav_sales: "المبيعات",
    nav_profile: "الملف الشخصي",
    welcome: "مرحباً بك مجدداً",
    lang_msg: "تم تغيير اللغة للعربية"
  }
};

let currentLang = localStorage.getItem('lang') || 'en';

function applyLanguage() {
  const isRtl = currentLang === 'ar';
  document.body.classList.toggle('rtl', isRtl);
  document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
  
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = translations[currentLang][key] || el.textContent;
  });
}

function toggleLanguage() {
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  localStorage.setItem('lang', currentLang);
  applyLanguage();
  notify(translations[currentLang].lang_msg);
}

// --- 2. منطق العمل الأصلي الخاص بك (Core Logic) ---
// ملاحظة: تأكد من دمج بقية دوال الـ JavaScript الخاصة بك هنا (renderProducts, loadSales, إلخ)

function doLogin() {
  const user = document.getElementById('login-user').value;
  if(user) {
    document.getElementById('login-page').classList.remove('active');
    document.getElementById('emp-app').classList.add('active');
  } else {
    document.getElementById('login-err').textContent = "Required!";
  }
}

function empTab(tab, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function notify(msg) {
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Initializations
window.onload = () => {
  applyLanguage();
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
  }, 1500);
};
</script>
</body>
</html>
