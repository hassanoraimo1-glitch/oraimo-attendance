<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oraimo System</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
  overflow-x:hidden;
  padding-bottom:70px;
}

/* ===== Language Buttons ===== */
#langBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:9999;
  background:#00ff88;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

#logoutBtn{
  position:fixed;
  top:50px;
  right:10px;
  z-index:9999;
  background:red;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

html[dir="rtl"] #langBtn,
html[dir="rtl"] #logoutBtn{
  right:auto;
  left:10px;
}

/* ===== Pages ===== */
.page{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  transition:0.4s;
}

.hidden{
  transform:translateX(100%);
}

.active{
  transform:translateX(0);
}

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px;
  z-index:9999;
}

.bottom-nav button{
  background:none;
  border:none;
  color:#00ff88;
  font-size:14px;
}
</style>
</head>

<body>

<button id="langBtn" onclick="toggleLang()">AR</button>
<button id="logoutBtn" data-key="logout">Logout</button>

<!-- ===== LOGIN ===== -->
<div id="loginPage" class="page active">
  <h2 data-key="login">Login</h2>
  <button onclick="showPage('dashboardPage')" data-key="login">Login</button>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboardPage" class="page hidden">
  <h2 data-key="dashboard">Dashboard</h2>
</div>

<!-- ===== ATTENDANCE ===== -->
<div id="attendancePage" class="page hidden">
  <h2 data-key="attendance">Attendance</h2>
</div>

<!-- ===== SALES ===== -->
<div id="salesPage" class="page hidden">
  <h2 data-key="sales">Sales</h2>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav">
  <button onclick="showPage('dashboardPage')" data-key="dashboard">Dashboard</button>
  <button onclick="showPage('attendancePage')" data-key="attendance">Attendance</button>
  <button onclick="showPage('salesPage')" data-key="sales">Sales</button>
</div>

<script>
/* ===== TRANSLATIONS ===== */
const translations = {
  en:{
    login:"Login",
    logout:"Logout",
    dashboard:"Dashboard",
    attendance:"Attendance",
    sales:"Sales"
  },
  ar:{
    login:"تسجيل الدخول",
    logout:"تسجيل الخروج",
    dashboard:"الرئيسية",
    attendance:"الحضور",
    sales:"المبيعات"
  }
};

let currentLang = localStorage.getItem("lang") || "en";

/* ===== LANGUAGE ===== */
function toggleLang(){
  currentLang = currentLang === "en" ? "ar" : "en";
  localStorage.setItem("lang", currentLang);
  applyLang();
}

function applyLang(){
  document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";

  document.querySelectorAll("[data-key]").forEach(el=>{
    const key = el.getAttribute("data-key");
    if(translations[currentLang][key]){
      el.innerText = translations[currentLang][key];
    }
  });

  document.getElementById("langBtn").innerText = currentLang === "en" ? "AR" : "EN";
}

applyLang();

/* ===== NAVIGATION ===== */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
    p.classList.add("hidden");
  });

  const page = document.getElementById(id);
  page.classList.remove("hidden");
  page.classList.add("active");
}
</script>

</body>
</html>
