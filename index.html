<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oraimo System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  overflow-x:hidden;
  padding-bottom:80px;
}

/* ===== Buttons ===== */
#langBtn, #logoutBtn{
  position:fixed;
  right:10px;
  z-index:9999;
  padding:6px 10px;
  border:none;
  border-radius:6px;
}

#langBtn{ top:10px; background:#00ff88; }
#logoutBtn{ top:50px; background:red; color:#fff; }

html[dir="rtl"] #langBtn,
html[dir="rtl"] #logoutBtn{
  right:auto;
  left:10px;
}

/* ===== Pages ===== */
.page{
  position:absolute;
  width:100%;
  top:0;
  left:0;
  min-height:100vh;
  transition: transform 0.4s ease;
}

.page.hidden{ transform: translateX(100%); }
.page.active{ transform: translateX(0); }

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px;
  z-index:9999;
}

button{
  background:#00ff88;
  border:none;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
}

/* RTL fix */
html[dir="rtl"]{
  direction:rtl;
}
</style>
</head>

<body>

<button id="langBtn" onclick="toggleLang()">AR</button>
<button id="logoutBtn" data-key="logout">Logout</button>

<!-- LOGIN -->
<div id="loginPage" class="page active">
  <h2 data-key="login">Login</h2>
  <input type="text" data-placeholder="username">
  <input type="password" data-placeholder="password">
  <br><br>
  <button onclick="showPage('dashboardPage')" data-key="submit">Submit</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="page hidden">
  <h2 data-key="dashboard">Dashboard</h2>
</div>

<!-- ATTENDANCE -->
<div id="attendancePage" class="page hidden">
  <h2 data-key="attendance">Attendance</h2>

  <button onclick="getLocation('in')" data-key="checkin">Check In</button>
  <button onclick="getLocation('out')" data-key="checkout">Check Out</button>
</div>

<!-- SALES -->
<div id="salesPage" class="page hidden">
  <h2 data-key="sales">Sales</h2>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="showPage('dashboardPage')" data-key="dashboard">Dashboard</button>
  <button onclick="showPage('attendancePage')" data-key="attendance">Attendance</button>
  <button onclick="showPage('salesPage')" data-key="sales">Sales</button>
</div>

<script>
/* ===== TRANSLATIONS ===== */
const translations = {
  en:{
    login:"Login",
    logout:"Logout",
    dashboard:"Dashboard",
    attendance:"Attendance",
    sales:"Sales",
    username:"Username",
    password:"Password",
    submit:"Submit",
    checkin:"Check In",
    checkout:"Check Out"
  },
  ar:{
    login:"تسجيل الدخول",
    logout:"تسجيل الخروج",
    dashboard:"الرئيسية",
    attendance:"الحضور",
    sales:"المبيعات",
    username:"اسم المستخدم",
    password:"كلمة المرور",
    submit:"تأكيد",
    checkin:"تسجيل حضور",
    checkout:"تسجيل انصراف"
  }
};

let currentLang = localStorage.getItem("lang") || "en";

/* ===== LANGUAGE ===== */
function toggleLang(){
  currentLang = currentLang === "en" ? "ar" : "en";
  localStorage.setItem("lang", currentLang);
  applyLang();
}

function applyLang(){
  document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";

  document.querySelectorAll("[data-key]").forEach(el=>{
    const key = el.dataset.key;
    el.innerText = translations[currentLang][key] || key;
  });

  document.querySelectorAll("[data-placeholder]").forEach(el=>{
    const key = el.dataset.placeholder;
    el.placeholder = translations[currentLang][key] || key;
  });

  document.getElementById("langBtn").innerText = currentLang === "en" ? "AR" : "EN";
}

/* ===== NAVIGATION ===== */
let currentPage = document.querySelector(".page.active");

function showPage(id){
  const newPage = document.getElementById(id);

  if(currentPage === newPage) return;

  currentPage.style.transform = "translateX(-100%)";
  newPage.style.transform = "translateX(0)";

  currentPage = newPage;
}

/* ===== LOCATION ===== */
function getLocation(type){
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      alert(
        (type === "in"
          ? (currentLang==="ar"?"تم تسجيل الحضور":"Check-in recorded")
          : (currentLang==="ar"?"تم تسجيل الانصراف":"Check-out recorded")
        ) +
        "\\nLat: " + lat +
        "\\nLng: " + lng
      );
    },
    (err)=>{
      alert("Location error: " + err.message);
    }
  );
}

/* INIT */
applyLang();
</script>

</body>
</html>
