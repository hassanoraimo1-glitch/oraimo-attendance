<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 72">
  <defs>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00C853"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="2" y="2" width="68" height="68" rx="18" fill="url(#gDark)" stroke="#00C853" stroke-width="1.5" opacity="0.9"/>

  <!-- Outer ring -->
  <circle cx="36" cy="36" r="24" fill="none" stroke="url(#gGreen)" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Middle ring -->
  <circle cx="36" cy="36" r="16" fill="none" stroke="#00C853" stroke-width="1.5" opacity="0.35"/>

  <!-- Inner filled circle -->
  <circle cx="36" cy="36" r="7" fill="url(#gGreen)" filter="url(#glow)"/>
  
  <!-- Center dot -->
  <circle cx="36" cy="36" r="3" fill="#060608"/>

  <!-- Signal arcs -->
  <path d="M 50 22 A 20 20 0 0 1 58 36" fill="none" stroke="#00C853" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M 54 16 A 28 28 0 0 1 65 36" fill="none" stroke="#00C853" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- ORAIMO word -->
  <text x="84" y="43"
    font-family="'Montserrat','Arial Black',sans-serif"
    font-size="29"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="2">oraimo</text>

  <!-- Tagline -->
  <text x="86" y="57"
    font-family="'Cairo','Arial',sans-serif"
    font-size="9"
    font-weight="600"
    fill="#00C853"
    letter-spacing="3.5"
    opacity="0.85">HR &amp; SALES SYSTEM</text>
</svg>
